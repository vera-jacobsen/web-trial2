<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mein Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef1f6;
      --surface: #f5f7fb;
      --text: #111214;
      --muted: #6b7280;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --radius: 18px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle vertical stripe background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 80px,
        rgba(200,210,230,0.18) 80px,
        rgba(200,210,230,0.18) 81px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* NAV */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
    }

    .nav-logo {
      background: white;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .nav-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .nav-btn:hover { background: var(--accent-hover); }
    .nav-btn svg { width: 20px; height: 20px; }

    /* HERO */
    .hero {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 40px;
      padding: 40px 40px 60px;
      min-height: calc(100vh - 90px);
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-left h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 5vw, 4.2rem);
      line-height: 1.1;
      font-weight: 400;
      color: var(--text);
    }

    .hero-left p {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      max-width: 360px;
    }

    .cta {
      display: inline-block;
      margin-top: 8px;
      padding: 13px 26px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      width: fit-content;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .cta:hover { background: var(--accent-hover); transform: translateY(-1px); }

    /* PHOTO GRID */
    .hero-right {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 160px 220px 220px;
      gap: 12px;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .photo {
      border-radius: var(--radius);
      overflow: hidden;
      background: #c9d4e0;
      position: relative;
    }

    /* Top-left: spans 1 column, 2 rows */
    .photo:nth-child(1) {
      grid-column: 1;
      grid-row: 1 / 3;
    }
    /* Top-right: partial crop (row 1 only, starts mid) */
    .photo:nth-child(2) {
      grid-column: 2;
      grid-row: 1;
    }
    /* Middle-right */
    .photo:nth-child(3) {
      grid-column: 2;
      grid-row: 2;
    }
    /* Bottom-left */
    .photo:nth-child(4) {
      grid-column: 1;
      grid-row: 3;
    }
    /* Bottom-right */
    .photo:nth-child(5) {
      grid-column: 2;
      grid-row: 3;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .photo:hover img { transform: scale(1.04); }

    /* Placeholder gradient when no image */
    .photo-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #b8c8dc 0%, #d8e4f0 100%);
    }

    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
        padding: 20px 20px 40px;
      }
      .hero-right {
        grid-template-rows: 120px 160px 160px;
        gap: 8px;
      }
      nav { padding: 16px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Mein Portfolio</div>
    <button class="nav-btn" aria-label="Menü">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
      </svg>
    </button>
  </nav>

  <section class="hero">
    <div class="hero-left">
      <h1>Momente, die bleiben</h1>
      <p>Professionelle Fotografie – festgehalten mit Leidenschaft und einem Blick fürs Besondere.</p>
      <a class="cta" href="#">Portfolio ansehen</a>
    </div>

    <div class="hero-right">
      <!-- Ersetze die src-Attribute mit deinen eigenen Bildern -->
      <div class="photo">
        <div class="photo-placeholder"></div>
      </div>
      <div class="photo">
        <div class="photo-placeholder" style="background: linear-gradient(135deg, #a0b8cc 0%, #c8dce8 100%);"></div>
      </div>
      <div class="photo">
        <div class="photo-placeholder" style="background: linear-gradient(135deg, #9ab0c4 0%, #bdd0e0 100%);"></div>
      </div>
      <div class="photo">
        <div class="photo-placeholder" style="background: linear-gradient(135deg, #b0c4d4 0%, #d0e0ec 100%);"></div>
      </div>
      <div class="photo">
        <div class="photo-placeholder" style="background: linear-gradient(135deg, #8caabf 0%, #b8ccdc 100%);"></div>
      </div>
    </div>
  </section>

</body>
</html>
